<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login page</title>
    <style>
        body{
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-position: center;
            background-size: cover;
            background: linear-gradient(to bottom, #000428, #004e92); 
            /* background-color: rgb(4, 4, 82); */
        }
        .container{
            width:300px;
            height:450px;
            border:1px solid black;
            align-items: center;
            margin: 50px auto;
            border-radius: 20px;
            transform: .1s;
            background-color: white;
        
        }
        .container:hover{
            box-shadow: 0 0 10px gray;
            transform: scale(1.02);
        }
        h1{
            text-align: center;
            font-size: 30px;
            font-weight: bold;
            margin-top: 20px;
            font-family: Arial, Helvetica, sans-serif;
            color: rgb(65, 65, 241);

        }
        .username, .password{
            width: 250px;
            height: 50px;
            /* border: 1px solid black; */
            margin: 25px auto;
            border-radius: 5px;
            font-size: 14px;
            /* padding-left: 10px; */
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            flex-direction: column;
            transform: 0s;
            border-bottom: 3px solid rgb(98, 98, 244);
        }
        .username input, .password input{
            height: 25px;
            /* margin-top: 5px; */
            border-radius: 5px;
            font-size: 14px;
            /* padding-left: 5px; */
            border: none;
            outline: none;
        }

        .username label, .password label{
            top:50%;
            left: 10px;
            padding-top: 5px;
            font-size: 14px;
            color: gray;
            transform: .5s;
            font-family: Arial, Helvetica, sans-serif;
        }
        .username:hover, .password:hover{
            box-shadow: 0 0 5px gray;
            transform: scale(1.01);
        }
        .submit{
            height: auto;
            width: auto;
            display: flex;
            flex-direction: row;
            justify-content: center;
        }
        /* .login01{
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        } */
        button{
            width: 250px;
            height: 35px;
            margin: 20px auto;
            border-radius: 25px;
            border: none;
            background-color: rgb(64, 64, 253);
            color: white;
            font-size: 16px;
            font-family: Arial, Helvetica, sans-serif;
            cursor: pointer;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            transform: 2s;
        }
        button:hover{
            background-color: rgb(25, 25, 235);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    

    <div class="container">
        <h1>login</h1>
        <form action="">
        <div class="username">
            <label for="">Email</label>
            <input type="email" required>
            
            <i class="fa-solid fa-envelope"></i>
        </div>
        <div class="password">
            <label for="">Password</label>
            <input type="password">
            
        </div>
        <div class="submit"><input type="checkbox"> Remember me 
        <a href="register.html">Forget Password</a></div>
        <div class="login01">
            <div><button type="button" onclick="window.location.href='index.html'" >Login as student</button></div>
            <div><button type="button" onclick="window.location.href='index.html'">Login as faculty</button></div>
        </div>
        <p style="text-align: center;">Don't have an account?<a href="register.html">register</a></p>
        </form>
    </div>
</body>
</html>
