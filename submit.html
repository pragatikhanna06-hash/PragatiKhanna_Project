<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submit Project</title>

<style>

body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(to bottom, #000428, #003973);
    font-family: 'Segoe UI', sans-serif;
}

/* CARD — matched to screenshot proportions */
.form-wrapper {
    width: 360px;              /* narrower like image */
    min-height: 520px;         /* taller card */
    padding: 55px 35px;
    background: #f4f4f4;
    border-radius: 14px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.35);
    text-align: center;
}

/* HEADING */
.form-wrapper h2 {
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 40px;
    color: #000;
    line-height: 1.3;
}

/* FORM */
#projectForm {
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* INPUTS */
#projectForm input,
#projectForm select,
#projectForm textarea {
    width: 280px;              /* smaller than card */
    height: 42px;
    padding: 0 12px;
    margin-bottom: 18px;
    border-radius: 6px;
    border: 1px solid #ccc;
    background: #e9e9e9;
    font-size: 14px;
    outline: none;
}

#projectForm textarea {
    height: 70px;
    padding-top: 10px;
    resize: none;
}

/* BUTTON */
#projectForm button {
    width: 280px;
    height: 44px;
    border-radius: 6px;
    border: none;
    background: linear-gradient(to right, #3b82f6, #2563eb);
    color: white;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 10px;
    transition: 0.3s ease;
}

#projectForm button:hover {
    opacity: 0.9;
}

</style>
</head>

<body>

<div class="form-wrapper">
    <h2>Upload your project<br>and inspire juniors</h2>

    <form id="projectForm">
        <input type="text" id="title" placeholder="Project Title" required>

        <select id="category">
            <option value="AI">AI</option>
            <option value="Web">Web</option>
            <option value="IoT">IoT</option>
        </select>

        <select id="level">
            <option value="Beginner">Beginner</option>
            <option value="Intermediate">Intermediate</option>
            <option value="Advanced">Advanced</option>
        </select>

        <textarea id="description" placeholder="Project Description" required></textarea>

        <input type="text" id="tags" placeholder="Tags (comma separated)">

        <button type="submit">Register</button>
    </form>
</div>



     <script>
document.getElementById("projectForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const project = {
        title: document.getElementById("title").value,
        category: document.getElementById("category").value,
        level: document.getElementById("level").value,
        description: document.getElementById("description").value,
        tags: document.getElementById("tags").value
    };

    let projects = JSON.parse(localStorage.getItem("projects")) || [];
    projects.push(project);
    localStorage.setItem("projects", JSON.stringify(projects));

    window.location.href = "index.html";
});
</script> 
</body>
</html>
